<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Global - Battle Map</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-light:#F0D080;--dark:#0A0A0F;--panel:#0F0F1A;--border:rgba(201,168,76,0.25);--text:#D8CCB0;--text-dim:#8A8070;}
html,body{height:100%;overflow:hidden}
body{background:var(--dark);color:var(--text);font-family:'Oswald',sans-serif;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 1rem;background:rgba(0,0,0,0.7);border-bottom:1px solid var(--border);flex-shrink:0;backdrop-filter:blur(4px);}
#topbar h1{font-family:'Cinzel',serif;color:var(--gold);font-size:1.1rem;letter-spacing:0.15em}
#phase-indicator{font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:0.2em;padding:0.3rem 1rem;border:1px solid var(--gold);color:var(--gold);text-transform:uppercase;background:rgba(201,168,76,0.08);}
#turn-info{font-size:0.8rem;color:var(--text-dim)}
#main{display:flex;flex:1;overflow:hidden}
#map-area{flex:1;position:relative;overflow:hidden;background:#07141f}
#map-area svg{width:100%;height:100%}
.territory-path{cursor:pointer;transition:opacity 0.12s;stroke-linejoin:round;stroke-linecap:round}
.territory-path:hover{opacity:0.82}
.territory-border{pointer-events:none;fill:none;stroke-linejoin:round}
.graticule{fill:none;stroke:rgba(100,160,220,0.07);stroke-width:0.5}
.sphere-bg{fill:#071828}
.army-badge-bg{pointer-events:none}
.army-badge-txt{font-family:'Oswald',sans-serif;font-weight:700;fill:white;text-anchor:middle;dominant-baseline:central;pointer-events:none}
.terr-label{font-family:'Oswald',sans-serif;font-weight:300;fill:rgba(255,255,255,0.9);text-anchor:middle;dominant-baseline:central;pointer-events:none;letter-spacing:0.04em}
.conn-line{stroke:rgba(255,255,255,0.12);stroke-width:0.8;fill:none;pointer-events:none}
.atk-pulse{animation:atkpulse 0.9s infinite}
@keyframes atkpulse{0%,100%{opacity:1}50%{opacity:0.5}}

#sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;}
.panel-section{padding:0.8rem 1rem;border-bottom:1px solid var(--border)}
.panel-section h3{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:0.6rem;}
.player-item{display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0;font-size:0.82rem}
.player-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.player-item.current-player{background:rgba(201,168,76,0.08);margin:0 -0.5rem;padding:0.35rem 0.5rem;border-radius:2px}
.player-item.eliminated{opacity:0.35;text-decoration:line-through}
.player-stats{margin-left:auto;color:var(--text-dim);font-size:0.75rem}
#action-panel{flex:1;padding:0.8rem 1rem;display:flex;flex-direction:column;gap:0.6rem}
.action-title{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:0.3rem}
.btn{display:block;width:100%;padding:0.55rem 1rem;background:transparent;border:1px solid rgba(201,168,76,0.3);color:var(--text);font-family:'Oswald',sans-serif;font-size:0.9rem;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;border-radius:2px;text-align:center;}
.btn:hover:not(:disabled){background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn.primary{background:rgba(139,26,26,0.4);border-color:rgba(200,80,80,0.5);color:#ff9999}
.btn.primary:hover:not(:disabled){background:rgba(139,26,26,0.6);border-color:#cc4444;color:#ffbbbb}
.btn.success{background:rgba(26,100,26,0.4);border-color:rgba(80,180,80,0.5);color:#99ff99}
.btn.success:hover:not(:disabled){background:rgba(26,100,26,0.6)}
.territory-info{background:rgba(0,0,0,0.3);border:1px solid var(--border);padding:0.7rem;border-radius:2px;font-size:0.82rem;line-height:1.6;}
.territory-info .terr-name{font-family:'Cinzel',serif;color:var(--gold);font-size:0.9rem}
.territory-info .terr-detail{color:var(--text-dim)}
.slider-group{display:flex;align-items:center;gap:0.5rem;font-size:0.82rem}
input[type=range]{flex:1;accent-color:var(--gold)}
.slider-val{min-width:2rem;text-align:right;color:var(--gold);font-family:'Cinzel',serif}
#log-panel{height:120px;overflow-y:auto;padding:0.5rem 1rem;background:rgba(0,0,0,0.3);border-top:1px solid var(--border);font-size:0.75rem;line-height:1.6;color:var(--text-dim);}
#log-panel p{border-bottom:1px solid rgba(255,255,255,0.05);padding:0.15rem 0}
#log-panel p:last-child{color:var(--text)}
#dice-result{display:none;background:rgba(0,0,0,0.4);border:1px solid var(--border);padding:0.7rem;border-radius:2px;text-align:center;font-size:0.85rem;}
.dice-row{display:flex;gap:0.4rem;justify-content:center;margin:0.3rem 0;flex-wrap:wrap}
.die{width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:1rem;}
.die.atk{background:#5a1010;border:1px solid #aa2020;color:#ff8888}
.die.def{background:#10205a;border:1px solid #2040aa;color:#8899ff}
.cont-item{display:flex;align-items:center;gap:0.5rem;padding:0.2rem 0;font-size:0.77rem}
.cont-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cont-bonus{margin-left:auto;color:var(--gold);font-family:'Cinzel',serif;font-size:0.7rem}
.card-item{display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.6rem;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:2px;font-size:0.78rem;cursor:pointer;transition:all 0.2s;margin:0.15rem;}
.card-item.selected{background:rgba(201,168,76,0.3);border-color:var(--gold);color:var(--gold)}
.cards-area{display:flex;flex-wrap:wrap}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;}
#overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--gold);padding:2rem;max-width:440px;width:90%;border-radius:4px;text-align:center;}
.modal h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.8rem;margin-bottom:1rem}
.modal p{color:var(--text);font-size:1rem;line-height:1.7;margin-bottom:1.5rem}
#tooltip{display:none;position:fixed;background:rgba(5,5,15,0.95);border:1px solid var(--gold);padding:0.5rem 0.8rem;font-size:0.78rem;pointer-events:none;z-index:50;border-radius:2px;min-width:140px;}
#tooltip .tt-name{font-family:'Cinzel',serif;color:var(--gold);font-size:0.82rem}
#tooltip .tt-info{color:var(--text-dim);margin-top:0.2rem}
#msg-banner{display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,0.95);border:1px solid var(--gold);padding:0.6rem 1.5rem;font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);z-index:60;border-radius:2px;white-space:nowrap;}
#map-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#07141f;z-index:10;font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;letter-spacing:0.2em;flex-direction:column;gap:1rem}
#map-loading .spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.2)}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:2px}
</style>
</head>

<div id="topbar">

    </div>
    <div class="panel-section"><h3>Continents</h3><div id="continent-list"></div></div>
  </div>
</div>
<div id="log-panel"></div>
<div id="tooltip"><div class="tt-name" id="tt-name"></div><div class="tt-info" id="tt-info"></div></div>
<div id="msg-banner"></div>
<div id="overlay">

  "Central Asia":"Middle East & Central Asia","Afghanistan & Pakistan":"Middle East & Central Asia",
  "India":"South & Southeast Asia","Sri Lanka & South India":"South & Southeast Asia","Southeast Asia Mainland":"South & Southeast Asia",
  "Indonesia & Malaysia":"South & Southeast Asia","Philippines":"South & Southeast Asia","Indochina":"South & Southeast Asia",

  "Western Russia":"Russia & North Asia","Siberia West":"Russia & North Asia","Siberia Central":"Russia & North Asia","Siberia East":"Russia & North Asia","Kamchatka":"Russia & North Asia",
  "Western Australia":"Oceania","Eastern Australia":"Oceania","New Zealand & Pacific":"Oceania"
};

function hexRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function darken(hex,f){return `rgb(${Math.round(parseInt(hex.slice(1,3),16)*f)},${Math.round(parseInt(hex.slice(3,5),16)*f)},${Math.round(parseInt(hex.slice(5,7),16)*f)})`;}

// =====================================================================
// GAME STATE
// =====================================================================
let state=null, selectedTerritory=null, attackFrom=null, selectedCards=[];
let projection=null, pathGen=null, svgEl=null;
// Map from territory name -> merged GeoJSON feature
let terrFeatures = {};
// Map from territory name -> projected centroid [x,y]
let terrCentroids = {};

// =====================================================================
// INIT
// =====================================================================
async function init() {
  const [worldData, gameState] = await Promise.all([
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json()),
    fetch('/api/state').then(r => {
      if(r.status===404){window.location.href='/';return null;}
      return r.json();
    })
  ]);
  if(!gameState) return;
  state = gameState;

  buildMap(worldData);
  document.getElementById('map-loading').style.display = 'none';
  render();
}

// =====================================================================
// MAP BUILDING WITH D3 + TopoJSON
// =====================================================================
function buildMap(world) {
  const mapArea = document.getElementById('map-area');
  const W = mapArea.clientWidth, H = mapArea.clientHeight;

  // Create SVG
  const svg = d3.select('#map-area').append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');
  svgEl = svg;

  // Natural Earth projection — looks great for a world Risk map
  projection = d3.geoNaturalEarth1()
    .scale(W / 6.3)
    .translate([W / 2, H / 2]);

  pathGen = d3.geoPath().projection(projection);

  // Ocean background
  svg.append('path')
    .datum({type:'Sphere'})
    .attr('class','sphere-bg')
    .attr('d', pathGen);

  // Graticule (lat/lon lines)
  const graticule = d3.geoGraticule().step([20, 20]);
  svg.append('path')
    .datum(graticule())
    .attr('class','graticule')
    .attr('d', pathGen);

  // Convert TopoJSON -> GeoJSON features (individual countries)
  const countries = topojson.feature(world, world.objects.countries);

  // Group countries into territories
  const terrGroups = {}; // territory -> [GeoJSON features]
  for(const feature of countries.features) {
    const id = parseInt(feature.id);
    const direct = COUNTRY_TO_TERRITORY[id];
    if(!direct) continue;

    if(SPLIT_RULES[direct]) {
      // Need to split this country by geometry
      const splitResult = splitCountryFeature(feature, SPLIT_RULES[direct]);
      for(const [terrName, subFeature] of Object.entries(splitResult)) {
        if(!terrGroups[terrName]) terrGroups[terrName] = [];
        terrGroups[terrName].push(subFeature);
      }
    } else {
      if(!terrGroups[direct]) terrGroups[direct] = [];
      terrGroups[direct].push(feature);
    }
  }

  // Merge features per territory and compute paths
  const layers = {
    tint: svg.append('g').attr('id','layer-tint'),
    fill: svg.append('g').attr('id','layer-fill'),
    border: svg.append('g').attr('id','layer-border'),
    conn: svg.append('g').attr('id','layer-conn'),
    label: svg.append('g').attr('id','layer-label'),
    army: svg.append('g').attr('id','layer-army'),
    hl: svg.append('g').attr('id','layer-hl'),
  };

  for(const [terrName, features] of Object.entries(terrGroups)) {
    // Merge all country geometries for this territory
    let merged;
    try {
      if(features.length === 1) {
        merged = features[0];
      } else {
        // Use topojson merge approach via d3 union
        merged = {
          type: 'Feature',
          geometry: {
            type: 'GeometryCollection',
            geometries: features.map(f => f.geometry).filter(Boolean)
          },
          properties: {name: terrName}
        };
        // Actually merge to single polygon
        merged = mergeFeatures(features);
      }
    } catch(e) {
      merged = features[0];
    }
    terrFeatures[terrName] = merged;

    // Compute label centroid from TERR_LABEL_POS or feature centroid
    const labelPos = TERR_LABEL_POS[terrName];
    if(labelPos) {
      const [px, py] = projection(labelPos);
      terrCentroids[terrName] = [px, py];
    } else {
      try {
        const c = pathGen.centroid(merged);
        terrCentroids[terrName] = c;
      } catch(e) {
        terrCentroids[terrName] = [0,0];
      }
    }

    // Draw continent tint
    layers.tint.append('path')
      .datum(merged)
      .attr('d', pathGen)
      .attr('fill', hexRgba(CONT_COLORS[TERR_CONT[terrName]]||'#666', 0.15))
      .attr('stroke', 'none');

    // Draw fill (updated dynamically)
    layers.fill.append('path')
      .datum(merged)
      .attr('d', pathGen)
      .attr('class', 'territory-path')
      .attr('data-terr', terrName)
      .attr('fill', 'rgba(50,50,70,0.3)')
      .attr('stroke', 'none')
      .on('click', () => handleClick(terrName))
      .on('mouseenter', (e) => showTT(e, terrName))
      .on('mousemove', (e) => moveTT(e))
      .on('mouseleave', hideTT);

    // Draw border
    layers.border.append('path')
      .datum(merged)
      .attr('d', pathGen)
      .attr('class', 'territory-border')
      .attr('data-terr-border', terrName)
      .attr('stroke', 'rgba(0,0,0,0.55)')
      .attr('stroke-width', 0.8);
  }

  // Draw connection lines
  const drawn = new Set();
  for(const [t, nbrs] of Object.entries(ADJACENCIES_JS)) {
    for(const n of nbrs) {
      const key = [t,n].sort().join('||');
      if(drawn.has(key)) continue;
      drawn.add(key);
      const c1 = terrCentroids[t], c2 = terrCentroids[n];
      if(!c1||!c2) continue;
      const dx = Math.abs(c2[0]-c1[0]);
      if(dx > W*0.6) continue; // skip wrap-around in main view
      layers.conn.append('line')
        .attr('class','conn-line')
        .attr('x1',c1[0]).attr('y1',c1[1])
        .attr('x2',c2[0]).attr('y2',c2[1]);
    }
  }

  // Alaska-Kamchatka wrap arc
  const c1 = terrCentroids['Alaska'], c2 = terrCentroids['Kamchatka'];
  if(c1 && c2) {
    layers.conn.append('path')
      .attr('d', `M${c1[0]},${c1[1]} C ${c1[0]},${c1[1]-60} ${c2[0]},${c2[1]-60} ${c2[0]},${c2[1]}`)
      .attr('stroke','rgba(255,255,255,0.1)')
      .attr('stroke-width',1)
      .attr('stroke-dasharray','4,3')
      .attr('fill','none');
  }

  // Labels and army badges (populated in renderMap)
  renderMap();
}

function mergeFeatures(features) {
  if(features.length === 1) return features[0];
  // Create a MultiPolygon from all features
  const allPolygons = [];
  for(const f of features) {
    if(!f.geometry) continue;
    if(f.geometry.type === 'Polygon') {
      allPolygons.push(f.geometry.coordinates);
    } else if(f.geometry.type === 'MultiPolygon') {
      allPolygons.push(...f.geometry.coordinates);
    }
  }
  return {
    type: 'Feature',
    geometry: { type: 'MultiPolygon', coordinates: allPolygons },
    properties: {}
  };
}

function splitCountryFeature(feature, splitFn) {
  // Split a country's geometry into sub-features based on centroid lon/lat
  const result = {};
  const geom = feature.geometry;
  if(!geom) return result;

  const polygons = geom.type === 'Polygon'
    ? [geom.coordinates]
    : geom.coordinates;

  for(const rings of polygons) {
    // Find centroid of this polygon ring
    const ring = rings[0];
    let lonSum=0, latSum=0;
    for(const [lon,lat] of ring) { lonSum+=lon; latSum+=lat; }
    const lon = lonSum/ring.length;
    const lat = latSum/ring.length;
    const terrName = splitFn(lon, lat);
    if(!result[terrName]) result[terrName] = {type:'Feature',geometry:{type:'MultiPolygon',coordinates:[]},properties:{}};
    result[terrName].geometry.coordinates.push(rings);
  }
  return result;
}

// =====================================================================
// RENDER
// =====================================================================
function render() {
  if(!state) return;
  const phases = {reinforce:'REINFORCE',attack:'ATTACK',fortify:'FORTIFY'};
  document.getElementById('phase-indicator').textContent = phases[state.phase]||state.phase.toUpperCase();
  document.getElementById('turn-info').textContent = `Turn ${state.turn}`;
  renderPlayers();
  if(svgEl) renderMap();
  renderActions();
  renderCards();
  renderLog();
  if(state.winner !== null && state.winner !== undefined) {
    const w = state.players.find(p=>p.id===state.winner);
    document.getElementById('overlay-title').textContent = w?.is_human?'🏆 Victory!':'💀 Defeated';
    document.getElementById('overlay-msg').textContent = w?.is_human
      ?'You have conquered the world and stand as supreme ruler!'
      :`${w?.name} has conquered the world. Better luck next time.`;
    document.getElementById('overlay').classList.add('show');
  }
}

function renderPlayers() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  for(const p of state.players) {
    const d = document.createElement('div');
    d.className = 'player-item'+(p.id===state.current_player?' current-player':'')+(p.eliminated?' eliminated':'');
    d.innerHTML = `<div class="player-dot" style="background:${p.color}"></div><span>${p.is_human?'👤 ':'🤖 '}${p.name}</span><span class="player-stats">${p.territory_count}🗺 ${p.army_count}⚔</span>`;
    list.appendChild(d);
  }
}

function renderMap() {
  if(!svgEl||!state) return;
  const human = state.players.find(p=>p.is_human);
  const current = state.players.find(p=>p.id===state.current_player);
  const humanTurn = current?.is_human;

  // Update fills and borders
  svgEl.selectAll('.territory-path').each(function() {
    const name = this.getAttribute('data-terr');
    if(!name||!state.territories[name]) return;
    const data = state.territories[name];
    const owner = state.players.find(p=>p.id===data.owner);
    const cColor = CONT_COLORS[TERR_CONT[name]]||'#666';
    const oColor = owner ? owner.color : cColor;
    const isAtkable = attackFrom && ADJACENCIES_JS[attackFrom]?.includes(name)
      && data.owner !== human?.id && humanTurn && state.phase==='attack';
    const isSel = name===selectedTerritory;
    const isAtkFrom = name===attackFrom;

    d3.select(this)
      .attr('fill', owner ? hexRgba(oColor, 0.65) : hexRgba(cColor, 0.12))
      .classed('atk-pulse', isAtkable);
  });

  svgEl.selectAll('.territory-border').each(function() {
    const name = this.getAttribute('data-terr-border');
    if(!name||!state.territories[name]) return;
    const isAtkable = attackFrom && ADJACENCIES_JS[attackFrom]?.includes(name)
      && state.territories[name].owner !== human?.id && humanTurn && state.phase==='attack';
    const isSel = name===selectedTerritory;
    const isAtkFrom = name===attackFrom;

    d3.select(this)
      .attr('stroke', isSel||isAtkFrom ? '#FFD700' : isAtkable ? '#FF4444' : 'rgba(0,0,0,0.55)')
      .attr('stroke-width', isSel||isAtkFrom ? 2.5 : isAtkable ? 2 : 0.8);
  });

  // Redraw labels & army badges
  svgEl.select('#layer-label').selectAll('*').remove();
  svgEl.select('#layer-army').selectAll('*').remove();
  svgEl.select('#layer-hl').selectAll('*').remove();

  for(const [name, data] of Object.entries(state.territories)) {
    const c = terrCentroids[name];
    if(!c||isNaN(c[0])||isNaN(c[1])) continue;
    const [cx, cy] = c;
    const owner = state.players.find(p=>p.id===data.owner);
    const oColor = owner ? owner.color : '#666';

    const isSel = name===selectedTerritory;
    const isAtkFrom = name===attackFrom;
    const isAtkable = attackFrom && ADJACENCIES_JS[attackFrom]?.includes(name)
      && data.owner !== human?.id && humanTurn && state.phase==='attack';

    // Glow highlight
    if(isSel||isAtkFrom||isAtkable) {
      const feat = terrFeatures[name];
      if(feat) {
        svgEl.select('#layer-hl').append('path')
          .datum(feat)
          .attr('d', pathGen)
          .attr('fill', 'none')
          .attr('stroke', isAtkable?'rgba(255,60,60,0.6)':'rgba(255,215,0,0.5)')
          .attr('stroke-width', 5)
          .attr('stroke-linejoin','round')
          .attr('filter','drop-shadow(0 0 6px '+(isAtkable?'#ff4444':'#ffd700')+')')
          .style('pointer-events','none');
      }
    }

    // Territory name — split across 2 lines if needed
    const words = name.split(' ');
    const mid = Math.ceil(words.length/2);
    const line1 = words.slice(0,mid).join(' ');
    const line2 = words.slice(mid).join(' ');
    const hasTwo = line2.length > 0;
    const nameY = hasTwo ? cy - 7 : cy - 5;
    const armyY = hasTwo ? cy + 16 : cy + 10;

    const labelGroup = svgEl.select('#layer-label').append('g');
    function addLabel(txt, y, sz) {
      labelGroup.append('text')
        .attr('x', cx).attr('y', y)
        .attr('class','terr-label')
        .attr('font-size', sz||7)
        .attr('filter','drop-shadow(0 0 2px rgba(0,0,0,1))')
        .text(txt);
    }
    addLabel(line1, nameY);
    if(hasTwo) addLabel(line2, nameY+9);

    // Army badge
    const armyGroup = svgEl.select('#layer-army').append('g');
    armyGroup.append('circle')
      .attr('cx',cx).attr('cy',armyY).attr('r',9)
      .attr('fill', owner ? darken(oColor, 0.4) : 'rgba(0,0,0,0.7)')
      .attr('stroke', owner ? hexRgba(oColor, 0.9) : 'rgba(255,255,255,0.2)')
      .attr('stroke-width', 1.5)
      .style('pointer-events','none');

    armyGroup.append('text')
      .attr('x',cx).attr('y',armyY)
      .attr('class','army-badge-txt')
      .attr('font-size', 10)
      .text(data.armies);
  }
}

// =====================================================================
// INTERACTIONS
// =====================================================================
function handleClick(name) {
  const data = state.territories[name];
  if(!data) return;
  const human = state.players.find(p=>p.is_human);
  const current = state.players.find(p=>p.id===state.current_player);
  const humanTurn = current?.is_human;
  selectedTerritory = name;
  updateTerrInfo(name);
  if(!humanTurn){renderMap();return;}
  if(state.phase==='reinforce'){
    if(data.owner===human?.id) renderActions();
  } else if(state.phase==='attack'){
    if(data.owner===human?.id && data.armies>=2){
      attackFrom=name; showMsg(`Selected ${name}. Click an adjacent enemy to attack.`);
    } else if(attackFrom && ADJACENCIES_JS[attackFrom]?.includes(name) && data.owner!==human?.id){
      doAttack(attackFrom,name); return;
    } else if(data.owner!==human?.id){
      showMsg('Select one of your territories with 2+ armies first.');
    }
  } else if(state.phase==='fortify'){
    if(data.owner===human?.id){
      if(!attackFrom||attackFrom===name){
        attackFrom=name; showMsg(`Selected ${name}. Click another territory to fortify.`); renderActions();
      } else {
        renderFortifyUI(attackFrom, name); return;
      }
    }
  }
  renderMap();
}

function updateTerrInfo(name) {
  const data = state.territories[name];
  const owner = state.players.find(p=>p.id===data.owner);
  const adjs = (ADJACENCIES_JS[name]||[]).map(n=>{
    const t=state.territories[n], o=state.players.find(p=>p.id===t?.owner);
    return `<span style="color:${o?.color||'#888'}">${n}</span>`;
  }).join(', ');
  document.getElementById('territory-info').innerHTML=`
    <div class="terr-name">${name}</div>
    <div class="terr-detail">Continent: ${data.continent}</div>
    <div class="terr-detail">Owner: <span style="color:${owner?.color}">${owner?.name||'None'}</span></div>
    <div class="terr-detail">Armies: <strong style="color:var(--gold)">${data.armies}</strong></div>
    <div class="terr-detail" style="font-size:0.73rem;margin-top:0.3rem">Borders: ${adjs}</div>`;
}

function renderActions() {
  const ac = document.getElementById('action-content');
  const human = state.players.find(p=>p.is_human);
  const current = state.players.find(p=>p.id===state.current_player);
  if(!current?.is_human){
    ac.innerHTML=`<div style="color:var(--text-dim);text-align:center;margin-top:1rem"><div style="font-size:1.2rem;margin-bottom:0.5rem">🤖</div>${current?.name} is taking their turn...</div>`;
    return;
  }
  if(state.phase==='reinforce'){
    const terr=selectedTerritory&&state.territories[selectedTerritory]?.owner===human?.id?selectedTerritory:null;
    ac.innerHTML=`<div class="action-title">Reinforce Phase</div>
      <div style="color:var(--gold);font-family:'Cinzel',serif;font-size:0.85rem;margin-bottom:0.5rem">Armies to place: <strong>${(state.reinforce_pool||0)}</strong></div>
      ${terr?`<div style="font-size:0.82rem;margin-bottom:0.5rem;color:var(--text-dim)">Reinforcing: <span style="color:var(--gold)">${terr}</span></div>
        <div class="slider-group"><input type="range" id="reinf-slider" min="1" max="${(state.reinforce_pool||0)}" value="${Math.min((state.reinforce_pool||0),3)}" oninput="document.getElementById('reinf-val').textContent=this.value">
        <span class="slider-val" id="reinf-val">${Math.min((state.reinforce_pool||0),3)}</span></div>
        <button class="btn success" style="margin-top:0.5rem" onclick="doReinforce('${terr}')">Place Armies</button>`
      :`<div style="color:var(--text-dim);font-size:0.8rem;font-style:italic">Click one of your territories to reinforce it.</div>`}`;
  } else if(state.phase==='attack'){
    ac.innerHTML=`<div class="action-title">Attack Phase</div>
      <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.6rem">${attackFrom?`Attacking from: <span style="color:var(--gold)">${attackFrom}</span>`:'Select your territory, then click an enemy.'}</div>
      ${attackFrom?`<div class="slider-group" style="margin-bottom:0.5rem"><label style="font-size:0.78rem;color:var(--text-dim);width:60px">Dice:</label>
        <input type="range" id="dice-slider" min="1" max="${Math.min(3,(state.territories[attackFrom]?.armies||1)-1)}" value="${Math.min(3,(state.territories[attackFrom]?.armies||1)-1)}" oninput="document.getElementById('dice-val').textContent=this.value">
        <span class="slider-val" id="dice-val">${Math.min(3,(state.territories[attackFrom]?.armies||1)-1)}</span></div>
        <button class="btn" onclick="attackFrom=null;renderMap();renderActions()">Cancel Selection</button>`:''}
      <button class="btn primary" style="margin-top:0.5rem" onclick="doEndAttack()">End Attacks →</button>`;
  } else if(state.phase==='fortify'){
    ac.innerHTML=`<div class="action-title">Fortify Phase</div>
      <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.6rem">Move armies between your connected territories.</div>
      <div style="font-size:0.78rem;color:var(--text-dim)">${attackFrom?`From: <span style="color:var(--gold)">${attackFrom}</span> — Click another territory.`:'Click one of your territories to start.'}</div>
      <button class="btn success" style="margin-top:0.8rem" onclick="doSkipFortify()">Skip Fortify →</button>`;
  }
}

function renderFortifyUI(from,to){
  const max=(state.territories[from]?.armies||2)-1;
  document.getElementById('action-content').innerHTML=`<div class="action-title">Fortify</div>
    <div style="font-size:0.82rem;margin-bottom:0.5rem;color:var(--text-dim)"><span style="color:var(--gold)">${from}</span> → <span style="color:#99ff99">${to}</span></div>
    <div class="slider-group"><input type="range" id="fort-slider" min="1" max="${max}" value="${Math.min(max,Math.floor(max/2)+1)}" oninput="document.getElementById('fort-val').textContent=this.value">
    <span class="slider-val" id="fort-val">${Math.min(max,Math.floor(max/2)+1)}</span></div>
    <button class="btn success" style="margin-top:0.5rem" onclick="doFortify('${from}','${to}')">Fortify</button>
    <button class="btn" style="margin-top:0.3rem" onclick="attackFrom=null;selectedTerritory=null;renderActions();renderMap()">Cancel</button>`;
}

function renderCards() {
  const human=state.players.find(p=>p.is_human);if(!human)return;
  document.getElementById('card-count').textContent=human.cards.length;
  const area=document.getElementById('cards-area');area.innerHTML='';selectedCards=[];
  const icons={infantry:'⚔',cavalry:'🐎',artillery:'💣',wild:'⭐'};
  human.cards.forEach((card,i)=>{
    const s=document.createElement('span');s.className='card-item';s.textContent=`${icons[card]||'?'} ${card}`;
    s.addEventListener('click',()=>{
      s.classList.toggle('selected');
      selectedCards=s.classList.contains('selected')?[...selectedCards,i]:selectedCards.filter(x=>x!==i);
      document.getElementById('trade-cards-btn').style.display=selectedCards.length===3?'block':'none';
    });
    area.appendChild(s);
  });
  document.getElementById('trade-cards-btn').style.display='none';
}

async function tradeSelectedCards(){
  if(selectedCards.length!==3)return;
  const res=await fetch('/api/trade_cards',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({card_indices:selectedCards})});
  const data=await res.json();
  if(data.error){showMsg('❌ '+data.error);return;}
  showMsg(`✅ Cards traded! +${data.bonus_armies} armies!`);
  state=data.state;
render();
}

function renderLog(){
  const log=document.getElementById('log-panel');
  log.innerHTML=(state.attack_log||[]).map(e=>`<p>${e}</p>`).join('');
  log.scrollTop=log.scrollHeight;
}

// =====================================================================
// API ACTIONS
// =====================================================================
async function doReinforce(territory){
  const armies=parseInt(document.getElementById('reinf-slider')?.value||1);
  if(armies>(state.reinforce_pool||0)){showMsg('Not enough armies!');return;}
  const res=await fetch('/api/reinforce',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({territory,armies})});
  const data=await res.json();if(data.error){showMsg('❌ '+data.error);return;}
  state=data.state;
attackFrom=null;render();
}

async function doAttack(from,to){
  const dice=parseInt(document.getElementById('dice-slider')?.value||3);
  const res=await fetch('/api/attack',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from,to,dice})});
  const data=await res.json();if(data.error){showMsg('❌ '+data.error);return;}
  showDiceResult(data);state=data.state;
  if(data.conquered){showMsg(`⚔ CONQUERED ${to}!`);attackFrom=null;selectedTerritory=null;}
  if(data.eliminated)showMsg(`💀 ${data.eliminated} has been eliminated!`);
  render();
  if(state.territories[from]?.armies<2){attackFrom=null;renderActions();renderMap();}
}

function showDiceResult(data){
  document.getElementById('dice-section').style.display='block';
  const r=document.getElementById('dice-result');r.style.display='block';
  r.innerHTML=`<div style="font-size:0.78rem;color:var(--text-dim);margin-bottom:0.3rem">${data.from} → ${data.to}</div>
    <div style="display:flex;gap:1rem;justify-content:center;align-items:center">
      <div><div style="font-size:0.7rem;color:#ff8888;margin-bottom:0.2rem">ATTACK</div><div class="dice-row">${data.atk_rolls.map(r=>`<div class="die atk">${r}</div>`).join('')}</div></div>
      <div style="color:var(--gold);font-size:1.2rem">VS</div>
      <div><div style="font-size:0.7rem;color:#8899ff;margin-bottom:0.2rem">DEFENSE</div><div class="dice-row">${data.def_rolls.map(r=>`<div class="die def">${r}</div>`).join('')}</div></div>
    </div>
    <div style="margin-top:0.4rem;font-size:0.78rem">${data.conquered?'<span style="color:#66ff66">⚔ TERRITORY CONQUERED!</span>':`<span style="color:#ff8888">Attacker lost: ${data.atk_losses}</span> | <span style="color:#8899ff">Defender lost: ${data.def_losses}</span>`}</div>`;
}

async function doEndAttack(){
  const res=await fetch('/api/end_attack',{method:'POST'});const data=await res.json();
  if(data.error){showMsg(data.error);return;}
  attackFrom=null;selectedTerritory=null;state=data.state;
  document.getElementById('dice-section').style.display='none';render();
}

async function doFortify(from,to){
  const armies=parseInt(document.getElementById('fort-slider')?.value||1);
  const res=await fetch('/api/fortify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from,to,armies})});
  const data=await res.json();if(data.error){showMsg('❌ '+data.error);return;}
  attackFrom=null;selectedTerritory=null;state=data.state;
render();
}

async function doSkipFortify(){
  const res=await fetch('/api/skip_fortify',{method:'POST'});const data=await res.json();
  if(data.error){showMsg(data.error);return;}
  attackFrom=null;selectedTerritory=null;state=data.state;
render();
}

function showTT(e,name){
  const data=state?.territories[name];if(!data)return;
  const owner=state.players.find(p=>p.id===data.owner);
  document.getElementById('tt-name').textContent=name;
  document.getElementById('tt-info').innerHTML=`<span style="color:${owner?.color}">${owner?.name||'Unclaimed'}</span> | ${data.armies} armies`;
  document.getElementById('tooltip').style.display='block';moveTT(e);
}
function moveTT(e){const t=document.getElementById('tooltip');t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-32)+'px';}
function hideTT(){document.getElementById('tooltip').style.display='none';}

let msgTimer;
function showMsg(t){
  const b=document.getElementById('msg-banner');b.textContent=t;b.style.display='block';
  clearTimeout(msgTimer);msgTimer=setTimeout(()=>{b.style.display='none';},3000);
}

// =====================================================================
// BOOT
// =====================================================================
init().then(()=>{
  if(!state)return;
  const list=document.getElementById('continent-list');
  for(const [name,data] of Object.entries(state.continents)){
    const d=document.createElement('div');d.className='cont-item';
    d.innerHTML=`<div class="cont-dot" style="background:${data.color}"></div><span style="font-size:0.72rem">${name}</span><span class="cont-bonus">+${data.bonus}</span>`;
    list.appendChild(d);
  }
});
</script>
</body>
</html>
