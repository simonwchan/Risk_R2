<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Global</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=IM+Fell+English&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#D8CCB0;font-family:'IM Fell English',serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:600px;width:90%;text-align:center}
h1{font-family:'Cinzel Decorative',serif;color:#C9A84C;font-size:clamp(2rem,6vw,3.5rem);text-shadow:0 0 40px rgba(201,168,76,0.4);margin-bottom:.3rem}
.sub{font-family:'Cinzel',serif;letter-spacing:.4em;font-size:.8rem;color:#9A8860;text-transform:uppercase;margin-bottom:2rem}
.box{border:1px solid rgba(201,168,76,0.3);padding:2.5rem;background:rgba(0,0,0,0.4)}
.box h2{font-family:'Cinzel',serif;color:#C9A84C;font-size:.85rem;letter-spacing:.25em;text-transform:uppercase;margin-bottom:1rem}
.btns{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem;margin-bottom:1.5rem}
.nb{background:transparent;border:1px solid rgba(201,168,76,0.35);color:#C9A84C;font-family:'Cinzel',serif;font-size:.9rem;padding:.45rem 1rem;cursor:pointer;transition:all .2s;border-radius:2px}
.nb:hover,.nb.sel{background:rgba(201,168,76,0.15);border-color:#C9A84C}
.go{display:block;width:100%;padding:1rem;background:linear-gradient(135deg,#6a1010,#8B1A1A);border:1px solid #C9A84C;color:#F0D080;font-family:'Cinzel Decorative',serif;font-size:1rem;letter-spacing:.15em;cursor:pointer;transition:all .3s;border-radius:2px}
.go:hover{background:linear-gradient(135deg,#8a1818,#a02020);box-shadow:0 4px 20px rgba(139,26,26,.5)}
.rules{margin-top:1.5rem;font-size:.82rem;color:#8A8070;line-height:1.9;text-align:left}
.rules b{color:#C9A84C}
</style>
</head>
<body>
<div class="wrap">
  <h1>Risk Global</h1>
  <p class="sub">World Domination</p>
  <div class="box">
    <h2>Number of AI Opponents</h2>
    <div class="btns" id="btns"></div>
    <button class="go" id="go">⚔ Begin Campaign ⚔</button>
    <div class="rules">
      <b>Reinforce</b> — place armies on your territories each turn<br>
      <b>Attack</b> — roll dice to conquer enemy territories<br>
      <b>Fortify</b> — move armies to strengthen your borders<br>
      <b>Win</b> — eliminate all opponents to rule the world
    </div>
  </div>
</div>
<script>
let chosen = 3;
const cont = document.getElementById('btns');
for(let i=2;i<=10;i++){
  const b=document.createElement('button');
  b.className='nb'+(i===3?' sel':'');
  b.textContent=i;
  b.onclick=()=>{document.querySelectorAll('.nb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');chosen=i};
  cont.appendChild(b);
}
document.getElementById('go').onclick=async()=>{
  const btn=document.getElementById('go');
  btn.textContent='Mobilising...';btn.disabled=true;
  const r=await fetch('/api/new',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({num_ai:chosen})});
  if((await r.json()).ok) window.location.href='/game';
  else{btn.textContent='⚔ Begin Campaign ⚔';btn.disabled=false;}
};
</script>
</body>
</html>
