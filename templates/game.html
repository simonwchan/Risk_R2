<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Risk Global</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--dark:#080810;--panel:#0d0d1a;--border:rgba(201,168,76,0.22);--txt:#D0C8B0;--dim:#7a7060}
html,body{height:100%;overflow:hidden;background:var(--dark);color:var(--txt);font-family:'Oswald',sans-serif}
/* layout */
#app{display:flex;flex-direction:column;height:100%}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:.4rem 1rem;background:rgba(0,0,0,.75);border-bottom:1px solid var(--border);flex-shrink:0;gap:1rem}
#topbar h1{font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;letter-spacing:.15em;white-space:nowrap}
#phase-pill{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;padding:.25rem .9rem;border:1px solid var(--gold);color:var(--gold);text-transform:uppercase;background:rgba(201,168,76,.08);white-space:nowrap}
#turn-lbl{font-size:.75rem;color:var(--dim);white-space:nowrap}
#body{display:flex;flex:1;min-height:0}
/* map */
#map-wrap{flex:1;overflow:hidden;background:#060e18;position:relative}
#map-wrap svg{width:100%;height:100%}
.sphere{fill:#071828}
.grid{fill:none;stroke:rgba(120,180,255,.05);stroke-width:.5}
.terr{cursor:pointer;transition:opacity .12s}
.terr:hover{opacity:.8}
.terr-border{fill:none;stroke-linejoin:round;pointer-events:none}
.conn{stroke:rgba(255,255,255,.1);stroke-width:.7;fill:none;pointer-events:none}
.lbl{font-family:'Oswald',sans-serif;font-weight:300;fill:rgba(255,255,255,.88);text-anchor:middle;dominant-baseline:central;pointer-events:none}
.badge-bg{pointer-events:none}
.badge-txt{font-family:'Oswald',sans-serif;font-weight:700;fill:#fff;text-anchor:middle;dominant-baseline:central;pointer-events:none}
@keyframes atk{0%,100%{opacity:1}50%{opacity:.45}}
.pulse{animation:atk .85s infinite}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;background:#060e18;z-index:9;font-family:'Cinzel',serif;color:var(--gold);font-size:.9rem;letter-spacing:.25em}
.spin{width:36px;height:36px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* sidebar — single scrollable column, no flex height games */
#sidebar{width:300px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;overflow-x:hidden;display:block}
.sec{padding:.65rem 1rem;border-bottom:1px solid var(--border)}
.sec-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:.45rem}
/* players */
.player{display:flex;align-items:center;gap:.5rem;padding:.25rem 0;font-size:.78rem}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pstats{margin-left:auto;color:var(--dim);font-size:.7rem}
.player.active{background:rgba(201,168,76,.08);margin:0 -.5rem;padding:.25rem .5rem;border-radius:2px}
.player.dead{opacity:.3;text-decoration:line-through}
/* action panel — normal block, not a flex child */
#actions{padding:.8rem 1rem;border-bottom:1px solid var(--border)}
.pool-display{font-family:'Cinzel',serif;font-size:2rem;color:var(--gold);text-align:center;margin:.3rem 0;line-height:1}
.pool-label{font-size:.68rem;color:var(--dim);text-align:center;margin-bottom:.6rem;letter-spacing:.1em}
.btn{display:block;width:100%;padding:.48rem .8rem;background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--txt);font-family:'Oswald',sans-serif;font-size:.83rem;letter-spacing:.05em;cursor:pointer;transition:all .18s;border-radius:2px;text-align:center;margin-bottom:.3rem}
.btn:hover:not(:disabled){background:rgba(201,168,76,.1);border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.red{background:rgba(139,26,26,.4);border-color:rgba(200,80,80,.5);color:#ffa0a0}
.btn.red:hover:not(:disabled){background:rgba(139,26,26,.65)}
.btn.green{background:rgba(20,90,20,.4);border-color:rgba(60,180,60,.5);color:#a0ffa0}
.btn.green:hover:not(:disabled){background:rgba(20,90,20,.65)}
.sel-info{background:rgba(0,0,0,.3);border:1px solid var(--border);padding:.45rem .6rem;font-size:.76rem;line-height:1.5;margin-bottom:.4rem;border-radius:2px}
.sel-info .name{font-family:'Cinzel',serif;color:var(--gold);font-size:.8rem}
.slider-row{display:flex;align-items:center;gap:.5rem;margin:.35rem 0}
.slider-row input[type=range]{flex:1;accent-color:var(--gold)}
.slider-val{min-width:1.8rem;text-align:right;color:var(--gold);font-family:'Cinzel',serif}
/* dice */
#dice-wrap{display:none;padding:.7rem 1rem;border-bottom:1px solid var(--border);text-align:center}
.dice-row{display:flex;justify-content:center;gap:.3rem;margin:.3rem 0;flex-wrap:wrap}
.die{width:30px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:.95rem}
.die.a{background:#4a0808;border:1px solid #aa2020;color:#ff9090}
.die.d{background:#081840;border:1px solid #2050bb;color:#90a8ff}
/* cards */
.card{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .55rem;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:2px;font-size:.75rem;cursor:pointer;transition:all .18s;margin:.12rem}
.card.sel{background:rgba(201,168,76,.28);border-color:var(--gold);color:var(--gold)}
/* conts */
.cont-row{display:flex;align-items:center;gap:.45rem;padding:.18rem 0;font-size:.73rem}
.cont-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.cont-bonus{margin-left:auto;color:var(--gold);font-family:'Cinzel',serif;font-size:.68rem}
/* log — fixed height at bottom of page */
#log{height:90px;overflow-y:auto;padding:.4rem .8rem;background:rgba(0,0,0,.25);border-top:1px solid var(--border);font-size:.7rem;line-height:1.7;color:var(--dim);flex-shrink:0}
#log p{border-bottom:1px solid rgba(255,255,255,.04);padding:.08rem 0}
#log p:last-child{color:var(--txt)}
/* toast */
#toast{display:none;position:fixed;top:52px;left:50%;transform:translateX(-50%);background:rgba(8,8,20,.96);border:1px solid var(--gold);padding:.5rem 1.2rem;font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);z-index:99;border-radius:2px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6)}
/* tooltip */
#tip{display:none;position:fixed;background:rgba(4,4,16,.96);border:1px solid var(--gold);padding:.4rem .7rem;font-size:.75rem;pointer-events:none;z-index:50;border-radius:2px;min-width:130px}
#tip .tn{font-family:'Cinzel',serif;color:var(--gold);font-size:.78rem}
#tip .ti{color:var(--dim);margin-top:.15rem}
/* win overlay */
#win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center}
#win.show{display:flex}
.win-box{background:var(--panel);border:1px solid var(--gold);padding:2.5rem;text-align:center;max-width:420px;width:90%;border-radius:4px}
.win-box h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.8rem;margin-bottom:.8rem}
.win-box p{color:var(--txt);font-size:.95rem;line-height:1.7;margin-bottom:1.5rem}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>⚔ Risk Global</h1>
    <div id="phase-pill">—</div>
    <div id="turn-lbl">Turn 1</div>
  </div>
  <div id="body">
    <div id="map-wrap">
      <div id="loading"><div class="spin"></div>LOADING MAP…</div>
    </div>
    <div id="sidebar">
      <div class="sec"><div class="sec-title">Players</div><div id="player-list"></div></div>
      <div id="actions"><div style="color:var(--dim);font-size:.8rem;text-align:center;margin-top:1rem">Loading…</div></div>
      <div id="dice-wrap">
        <div class="sec-title" style="margin-bottom:.4rem">Battle Result</div>
        <div id="dice-inner"></div>
      </div>
      <div class="sec">
        <div class="sec-title">Cards (<span id="card-count">0</span>)</div>
        <div id="cards-area"></div>
        <button class="btn green" id="trade-btn" style="display:none;margin-top:.4rem" onclick="tradeSel()">Trade 3 Cards</button>
      </div>
      <div class="sec">
        <div class="sec-title">Continents</div>
        <div id="cont-list"></div>
      </div>
    </div>
  </div>
  <div id="log"></div>
</div>

<div id="tip"><div class="tn" id="tip-name"></div><div class="ti" id="tip-info"></div></div>
<div id="toast"></div>
<div id="win"><div class="win-box">
  <h2 id="win-title">Victory!</h2>
  <p id="win-msg"></p>
  <button class="btn" onclick="location.href='/'">New Campaign</button>
</div></div>

// ── helpers ──────────────────────────────────────────────────────────
function hex(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function dk(h,f){return`rgb(${Math.round(parseInt(h.slice(1,3),16)*f)},${Math.round(parseInt(h.slice(3,5),16)*f)},${Math.round(parseInt(h.slice(5,7),16)*f)})`}
function post(url,body){return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json())}

// ── game state ───────────────────────────────────────────────────────
let S = null;          // full state from server
let selTerr = null;    // selected territory name
let atkFrom = null;    // attack source
let selCards = [];     // selected card indices
let proj = null, pathFn = null, svg = null;
let feat = {}, ctr = {};   // territory features & centroids

let msgTimer = null;
function toast(t,ms=3000){
  const el=document.getElementById('toast');
  el.textContent=t;el.style.display='block';
  clearTimeout(msgTimer);msgTimer=setTimeout(()=>el.style.display='none',ms);
}
function showTip(e,name){
  const d=S?.board[name];if(!d)return;
  const owner=S.players.find(p=>p.id===d.owner);
  document.getElementById('tip-name').textContent=name;
  document.getElementById('tip-info').innerHTML=`<span style="color:${owner?.color}">${owner?.name||'—'}</span> · ${d.armies} armies`;
  const tip=document.getElementById('tip');tip.style.display='block';moveTip(e);
}
function moveTip(e){const t=document.getElementById('tip');t.style.left=(e.clientX+13)+'px';t.style.top=(e.clientY-34)+'px'}
function hideTip(){document.getElementById('tip').style.display='none'}

// ── init ─────────────────────────────────────────────────────────────
async function init(){
  const [world, s] = await Promise.all([
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json()),
    fetch('/api/state').then(r=>{if(r.status===404){location.href='/';return null;}return r.json()})
  ]);
  if(!s)return;
  S=s;
  buildMap(world);
  document.getElementById('loading').style.display='none';
  buildContList();
  render();
}

// ── map ──────────────────────────────────────────────────────────────
function buildMap(world){
  const el=document.getElementById('map-wrap');
  const W=el.clientWidth,H=el.clientHeight;

  proj=d3.geoNaturalEarth1().scale(W/6.3).translate([W/2,H/2]);
  pathFn=d3.geoPath().projection(proj);

  svg=d3.select('#map-wrap').append('svg').attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet');
  svg.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',pathFn);
  svg.append('path').datum(d3.geoGraticule().step([20,20])()).attr('class','grid').attr('d',pathFn);

  // build territory features from topojson
  const countries=topojson.feature(world,world.objects.countries);
  const groups={};

  for(const f of countries.features){
    const id=parseInt(f.id);
    const raw=C2T[id];
    if(!raw)continue;
    const sfn=SPLIT[raw];
    if(sfn){
      const polys=f.geometry.type==='Polygon'?[f.geometry.coordinates]:f.geometry.coordinates;
      for(const rings of polys){
        const ring=rings[0];
        let lx=0,ly=0;
        for(const [a,b] of ring){lx+=a;ly+=b;}
        const lon=lx/ring.length,lat=ly/ring.length;
        const name=sfn(lon,lat);
        if(!groups[name])groups[name]={type:'Feature',geometry:{type:'MultiPolygon',coordinates:[]},properties:{}};
        groups[name].geometry.coordinates.push(rings);
      }
    } else {
      if(!groups[raw])groups[raw]={type:'Feature',geometry:{type:'MultiPolygon',coordinates:[]},properties:{}};
      const polys=f.geometry.type==='Polygon'?[f.geometry.coordinates]:f.geometry.coordinates;
      groups[raw].geometry.coordinates.push(...polys);
    }
  }

  // layers
  const ltint=svg.append('g');
  const lfill=svg.append('g').attr('id','lfill');
  const lborder=svg.append('g').attr('id','lborder');
  const lconn=svg.append('g');
  const llbl=svg.append('g').attr('id','llbl');
  const larmy=svg.append('g').attr('id','larmy');
  const lhl=svg.append('g').attr('id','lhl');

  for(const [name,f] of Object.entries(groups)){
    feat[name]=f;
    const lp=LPOS[name];
    ctr[name]=lp?proj(lp):(()=>{try{return pathFn.centroid(f)}catch{return[0,0]}})();

    // continent tint
    ltint.append('path').datum(f).attr('d',pathFn)
      .attr('fill',hex(CONT_COLORS[TERR_CONT[name]]||'#666',0.14)).attr('stroke','none');

    // fill (updated by render)
    lfill.append('path').datum(f).attr('d',pathFn)
      .attr('class','terr').attr('data-t',name)
      .attr('fill','rgba(30,30,50,0.3)').attr('stroke','none')
      .on('click',()=>handleClick(name))
      .on('mouseenter',e=>showTip(e,name))
      .on('mousemove',e=>moveTip(e))
      .on('mouseleave',hideTip);

    // border
    lborder.append('path').datum(f).attr('d',pathFn)
      .attr('class','terr-border').attr('data-tb',name)
      .attr('stroke','rgba(0,0,0,0.55)').attr('stroke-width',0.8);
  }

  // connection lines
  const drawn=new Set();
  for(const [t,nbs] of Object.entries(ADJACENCY)){
    for(const n of nbs){
      const k=[t,n].sort().join('|');
      if(drawn.has(k)||!ctr[t]||!ctr[n])continue;
      drawn.add(k);
      const [x1,y1]=ctr[t],[x2,y2]=ctr[n];
      if(Math.abs(x2-x1)>W*0.55)continue; // skip wrap-arounds
      lconn.append('line').attr('class','conn').attr('x1',x1).attr('y1',y1).attr('x2',x2).attr('y2',y2);
    }
  }
  // Alaska-Kamchatka arc
  if(ctr['Alaska']&&ctr['Kamchatka']){
    const [ax,ay]=ctr['Alaska'],[kx,ky]=ctr['Kamchatka'];
    lconn.append('path').attr('class','conn').attr('stroke-dasharray','4,3')
      .attr('d',`M${ax},${ay} C${ax},${ay-55} ${kx},${ky-55} ${kx},${ky}`);
  }

  renderMap();
}

// ── render ───────────────────────────────────────────────────────────
function render(){
  if(!S)return;
  document.getElementById('phase-pill').textContent={reinforce:'REINFORCE',attack:'ATTACK',fortify:'FORTIFY'}[S.phase]||S.phase.toUpperCase();
  document.getElementById('turn-lbl').textContent=`Turn ${S.turn}`;
  renderPlayers();
  if(svg)renderMap();
  renderActions();
  renderCards();
  renderLog();
  if(S.winner!==null&&S.winner!==undefined){
    const w=S.players.find(p=>p.id===S.winner);
    document.getElementById('win-title').textContent=w?.human?'🏆 Victory!':'💀 Defeat';
    document.getElementById('win-msg').textContent=w?.human
      ?'You have conquered the world and stand as supreme ruler!'
      :`${w?.name} has conquered the world. Better luck next time.`;
    document.getElementById('win').classList.add('show');
  }
}

function renderPlayers(){
  const el=document.getElementById('player-list');el.innerHTML='';
  for(const p of S.players){
    const d=document.createElement('div');
    d.className='player'+(p.id===S.current?' active':'')+(p.eliminated?' dead':'');
    d.innerHTML=`<div class="dot" style="background:${p.color}"></div><span>${p.human?'👤 ':'🤖 '}${p.name}</span><span class="pstats">${p.territories}🗺 ${p.armies}⚔</span>`;
    el.appendChild(d);
  }
}

function renderMap(){
  if(!S||!svg)return;
  const human=S.players.find(p=>p.human);
  const cur=S.players.find(p=>p.id===S.current);
  const myTurn=cur?.human;

  svg.selectAll('.terr').each(function(){
    const name=this.getAttribute('data-t');
    if(!name||!S.board[name])return;
    const d=S.board[name];
    const owner=S.players.find(p=>p.id===d.owner);
    const cc=CONT_COLORS[TERR_CONT[name]]||'#666';
    const oc=owner?owner.color:cc;
    const isAtk=atkFrom&&ADJACENCY[atkFrom]?.includes(name)&&d.owner!==human?.id&&myTurn&&S.phase==='attack';
    d3.select(this)
      .attr('fill',owner?hex(oc,0.65):hex(cc,0.1))
      .classed('pulse',isAtk);
  });

  svg.selectAll('.terr-border').each(function(){
    const name=this.getAttribute('data-tb');
    if(!name)return;
    const isSel=name===selTerr||name===atkFrom;
    const isAtk=atkFrom&&ADJACENCY[atkFrom]?.includes(name)
      &&S.board[name]?.owner!==human?.id&&myTurn&&S.phase==='attack';
    d3.select(this)
      .attr('stroke',isSel?'#FFD700':isAtk?'#FF4444':'rgba(0,0,0,0.55)')
      .attr('stroke-width',isSel?2.5:isAtk?2:0.8);
  });

  // labels + badges
  svg.select('#llbl').selectAll('*').remove();
  svg.select('#larmy').selectAll('*').remove();
  svg.select('#lhl').selectAll('*').remove();

  for(const [name,d] of Object.entries(S.board)){
    const c=ctr[name];if(!c||isNaN(c[0]))continue;
    const [cx,cy]=c;
    const owner=S.players.find(p=>p.id===d.owner);
    const oc=owner?owner.color:'#666';
    const isSel=name===selTerr||name===atkFrom;
    const isAtk=atkFrom&&ADJACENCY[atkFrom]?.includes(name)
      &&d.owner!==human?.id&&S.current===0&&S.phase==='attack';

    // glow ring
    if(isSel||isAtk){
      const f=feat[name];
      if(f) svg.select('#lhl').append('path').datum(f).attr('d',pathFn)
        .attr('fill','none')
        .attr('stroke',isAtk?'rgba(255,60,60,.55)':'rgba(255,210,0,.5)')
        .attr('stroke-width',5).attr('stroke-linejoin','round')
        .attr('filter','drop-shadow(0 0 5px '+(isAtk?'#f44':'#fd0')+')')
        .style('pointer-events','none');
    }

    // name label (split into 2 lines max)
    const words=name.split(' ');
    const mid=Math.ceil(words.length/2);
    const l1=words.slice(0,mid).join(' '),l2=words.slice(mid).join(' ');
    const hasTwo=l2.length>0;
    const nyBase=hasTwo?cy-7:cy-5;
    const armyY=hasTwo?cy+16:cy+10;

    const addLbl=(txt,y)=>svg.select('#llbl').append('text').attr('x',cx).attr('y',y)
      .attr('class','lbl').attr('font-size',7)
      .attr('filter','drop-shadow(0 0 2px rgba(0,0,0,1))').text(txt);
    addLbl(l1,nyBase);
    if(hasTwo)addLbl(l2,nyBase+9);

    // army badge
    const ag=svg.select('#larmy').append('g');
    ag.append('circle').attr('cx',cx).attr('cy',armyY).attr('r',9).attr('class','badge-bg')
      .attr('fill',owner?dk(oc,0.38):'rgba(0,0,0,.7)')
      .attr('stroke',owner?hex(oc,.9):'rgba(255,255,255,.2)').attr('stroke-width',1.5);
    ag.append('text').attr('x',cx).attr('y',armyY).attr('class','badge-txt').attr('font-size',10).text(d.armies);
  }
}

// ── actions panel ────────────────────────────────────────────────────
function renderActions(){
  const ac=document.getElementById('actions');
  const cur=S.players.find(p=>p.id===S.current);
  if(!cur?.human){
    ac.innerHTML=`<div style="text-align:center;margin-top:2rem;color:var(--dim)"><div style="font-size:1.5rem;margin-bottom:.5rem">🤖</div>${cur?.name}<br>is taking their turn…</div>`;
    return;
  }

  if(S.phase==='reinforce'){
    const pool=S.pool||0;
    const terr=selTerr&&S.board[selTerr]?.owner===S.current?selTerr:null;
    ac.innerHTML=`
      <div class="sec-title">Reinforce Phase</div>
      <div class="pool-display">${pool}</div>
      <div class="pool-label">ARMIES TO PLACE</div>
      ${pool===0
        ?`<div style="color:#80ff80;font-size:.78rem;text-align:center;margin-bottom:.6rem">✓ All armies placed</div>
           <button class="btn green" onclick="endReinforce()">Proceed to Attack →</button>`
        :terr
          ?`<div class="sel-info"><span class="name">${terr}</span><br>
              <span style="color:var(--dim)">Armies there now: ${S.board[terr].armies}</span></div>
             <div class="slider-row">
               <input type="range" id="rs" min="1" max="${pool}" value="${Math.min(pool,3)}"
                 oninput="document.getElementById('rv').textContent=this.value">
               <span class="slider-val" id="rv">${Math.min(pool,3)}</span>
             </div>
             <button class="btn green" onclick="doReinforce()">Place Armies</button>
             <button class="btn green" onclick="doReinforceAll()">Place All (${pool})</button>`
          :`<div style="color:var(--dim);font-size:.8rem;text-align:center">
              Click one of <span style="color:var(--gold)">your territories</span> on the map to place armies.
            </div>`
      }`;
  } else if(S.phase==='attack'){
    ac.innerHTML=`
      <div class="sec-title">Attack Phase</div>
      ${atkFrom
        ?`<div class="sel-info"><span class="name">${atkFrom}</span><br>
            <span style="color:var(--dim)">${S.board[atkFrom]?.armies} armies · click an adjacent enemy</span></div>
           <div class="slider-row">
             <span style="font-size:.75rem;color:var(--dim);width:40px">Dice</span>
             <input type="range" id="ds" min="1" max="${Math.min(3,(S.board[atkFrom]?.armies||1)-1)}"
               value="${Math.min(3,(S.board[atkFrom]?.armies||1)-1)}"
               oninput="document.getElementById('dv').textContent=this.value">
             <span class="slider-val" id="dv">${Math.min(3,(S.board[atkFrom]?.armies||1)-1)}</span>
           </div>
           <button class="btn" onclick="atkFrom=null;selTerr=null;renderMap();renderActions()">Cancel</button>`
        :`<div style="color:var(--dim);font-size:.8rem;text-align:center">
            Click <span style="color:var(--gold)">your territory</span> (2+ armies) then click an adjacent enemy.
          </div>`
      }
      <button class="btn red" style="margin-top:.5rem" onclick="endAttack()">End Attacks →</button>`;
  } else if(S.phase==='fortify'){
    ac.innerHTML=`
      <div class="sec-title">Fortify Phase</div>
      <div style="color:var(--dim);font-size:.8rem;text-align:center;margin-bottom:.6rem">
        ${atkFrom
          ?`From <span style="color:var(--gold)">${atkFrom}</span> — click another territory to move armies`
          :'Click one of your territories to move armies from it'}
      </div>
      ${atkFrom&&selTerr&&selTerr!==atkFrom
        ?`<div class="sel-info">
            <span class="name">${atkFrom}</span> → <span style="color:#80ff80">${selTerr}</span></div>
           <div class="slider-row">
             <input type="range" id="fs" min="1" max="${(S.board[atkFrom]?.armies||2)-1}"
               value="${Math.min((S.board[atkFrom]?.armies||2)-1,Math.ceil(((S.board[atkFrom]?.armies||2)-1)/2))}"
               oninput="document.getElementById('fv').textContent=this.value">
             <span class="slider-val" id="fv">${Math.min((S.board[atkFrom]?.armies||2)-1,Math.ceil(((S.board[atkFrom]?.armies||2)-1)/2))}</span>
           </div>
           <button class="btn green" onclick="doFortify()">Move Armies</button>`
        :''
      }
      <button class="btn red" onclick="skipFortify()">Skip Fortify →</button>`;
  }
}

// ── click handler ────────────────────────────────────────────────────
function handleClick(name){
  if(!S)return;
  const d=S.board[name];
  const cur=S.players.find(p=>p.id===S.current);
  if(!cur?.human){toast('Not your turn');return;}

  selTerr=name;

  if(S.phase==='reinforce'){
    // just select if it's ours
    if(d.owner!==S.current)toast('You don\'t own that territory');
    renderActions();renderMap();
    return;
  }

  if(S.phase==='attack'){
    if(!atkFrom){
      if(d.owner===S.current&&d.armies>=2){atkFrom=name;toast(`Attacking from ${name} — click an adjacent enemy`);}
      else if(d.owner===S.current)toast('Need at least 2 armies to attack from here');
      else toast('Select one of your territories first');
    } else if(name===atkFrom){
      atkFrom=null;
    } else if(d.owner===S.current){
      // switch attacker
      if(d.armies>=2){atkFrom=name;toast(`Attacking from ${name}`);}
      else toast('Need at least 2 armies');
    } else {
      // attack!
      if(!ADJACENCY[atkFrom]?.includes(name)){toast('Not adjacent');renderMap();return;}
      const dice=parseInt(document.getElementById('ds')?.value||3);
      execAttack(atkFrom,name,dice);
      return;
    }
    renderActions();renderMap();
    return;
  }

  if(S.phase==='fortify'){
    if(d.owner!==S.current){toast('You don\'t own that territory');return;}
    if(!atkFrom){atkFrom=name;selTerr=null;}
    else if(name===atkFrom){atkFrom=null;selTerr=null;}
    else{selTerr=name;}
    renderActions();renderMap();
  }
}

// ── api calls ────────────────────────────────────────────────────────
async function doReinforce(){
  const armies=parseInt(document.getElementById('rs')?.value||1);
  if(!selTerr)return;
  const r=await post('/api/reinforce',{territory:selTerr,armies});
  if(r.error){toast('❌ '+r.error);return;}
  S=r.state;render();
}
async function doReinforceAll(){
  if(!selTerr)return;
  const r=await post('/api/reinforce',{territory:selTerr,armies:S.pool});
  if(r.error){toast('❌ '+r.error);return;}
  S=r.state;render();
}
async function endReinforce(){
  const r=await post('/api/end_reinforce',{});
  if(r.error){toast('❌ '+r.error);return;}
  S=r.state;render();
}
async function execAttack(from,to,dice){
  const r=await post('/api/attack',{from,to,dice});
  if(r.error){toast('❌ '+r.error);return;}
  S=r.state;
  showDice(r);
  if(r.conquered){toast(`⚔ Conquered ${to}!`);atkFrom=null;selTerr=null;}
  if(r.eliminated)toast(`💀 ${r.eliminated} eliminated!`);
  if(S.board[from]?.armies<2&&atkFrom===from)atkFrom=null;
  render();
}
async function endAttack(){
  const r=await post('/api/end_attack',{});
  if(r.error){toast(r.error);return;}
  S=r.state;atkFrom=null;selTerr=null;
  document.getElementById('dice-wrap').style.display='none';
  render();
}
async function doFortify(){
  const from=atkFrom,to=selTerr;
  const armies=parseInt(document.getElementById('fs')?.value||1);
  const r=await post('/api/fortify',{from,to,armies});
  if(r.error){toast('❌ '+r.error);return;}
  S=r.state;atkFrom=null;selTerr=null;render();
}
async function skipFortify(){
  const r=await post('/api/skip_fortify',{});
  if(r.error){toast(r.error);return;}
  S=r.state;atkFrom=null;selTerr=null;render();
}
async function tradeSel(){
  if(selCards.length!==3){toast('Select exactly 3 cards');return;}
  const r=await post('/api/trade_cards',{indices:selCards});
  if(r.error){toast('❌ '+r.error);return;}
  toast(`✅ +${r.bonus} armies!`);
  S=r.state;selCards=[];render();
}

// ── dice display ─────────────────────────────────────────────────────
function showDice(r){
  const wrap=document.getElementById('dice-wrap');
  wrap.style.display='block';
  document.getElementById('dice-inner').innerHTML=`
    <div style="font-size:.72rem;color:var(--dim);margin-bottom:.3rem">${r.from} → ${r.to}</div>
    <div style="display:flex;gap:.8rem;justify-content:center;align-items:center">
      <div><div style="font-size:.65rem;color:#ff9090;margin-bottom:.2rem">ATK</div>
        <div class="dice-row">${r.atk_rolls.map(v=>`<div class="die a">${v}</div>`).join('')}</div></div>
      <div style="color:var(--gold)">vs</div>
      <div><div style="font-size:.65rem;color:#90a8ff;margin-bottom:.2rem">DEF</div>
        <div class="dice-row">${r.def_rolls.map(v=>`<div class="die d">${v}</div>`).join('')}</div></div>
    </div>
    <div style="margin-top:.35rem;font-size:.75rem;text-align:center">
      ${r.conquered
        ?'<span style="color:#80ff80">⚔ Territory Conquered!</span>'
        :`<span style="color:#ff9090">You lost ${r.atk_loss}</span> · <span style="color:#90a8ff">Enemy lost ${r.def_loss}</span>`}
    </div>`;
}

// ── cards ────────────────────────────────────────────────────────────
function renderCards(){
  const human=S.players.find(p=>p.human);
  if(!human)return;
  document.getElementById('card-count').textContent=human.cards.length;
  const area=document.getElementById('cards-area');area.innerHTML='';selCards=[];
  const ic={infantry:'⚔',cavalry:'🐎',artillery:'💣',wild:'⭐'};
  human.cards.forEach((c,i)=>{
    const el=document.createElement('span');
    el.className='card';el.textContent=`${ic[c]||'?'} ${c}`;
    el.onclick=()=>{
      el.classList.toggle('sel');
      selCards=el.classList.contains('sel')?[...selCards,i]:selCards.filter(x=>x!==i);
      document.getElementById('trade-btn').style.display=selCards.length===3?'block':'none';
    };
    area.appendChild(el);
  });
  document.getElementById('trade-btn').style.display='none';
}

// ── log ───────────────────────────────────────────────────────────────
function renderLog(){
  const el=document.getElementById('log');
  el.innerHTML=(S.log||[]).map(l=>`<p>${l}</p>`).join('');
  el.scrollTop=el.scrollHeight;
}

// ── continent list ────────────────────────────────────────────────────
function buildContList(){
  if(!S)return;
  const el=document.getElementById('cont-list');el.innerHTML='';
  for(const [n,d] of Object.entries(S.continents)){
    const row=document.createElement('div');row.className='cont-row';
    row.innerHTML=`<div class="cont-dot" style="background:${d.color}"></div><span>${n}</span><span class="cont-bonus">+${d.bonus}</span>`;
    el.appendChild(row);
  }
}

init();
</script>
